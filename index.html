<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><meta name="theme-color" content="#101114"><title>TPK OS</title><style>
:root{--bg:#101114;--panel:#17181d;--card:#1c1e24;--line:#2a2d36;--ink:#e8e8ec;--muted:#8b8f9c;--accent:#8b7ef8;--green:#3fbf6f;--yellow:#e0b13f;--red:#e05252}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:16px 14px 60px;max-width:640px;margin:0 auto}
h1{font-size:18px;letter-spacing:.2em}h1 .os{color:var(--accent)}
h2{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:26px 0 10px}
.gen{color:var(--muted);font-size:11px;margin:4px 0 8px}
.empty{color:var(--muted);font-size:13px}
.th{list-style:none}.th li{padding:6px 0 6px 20px;position:relative;font-size:14px;border-bottom:1px solid var(--line)}
.th li:before{content:"";position:absolute;left:2px;top:12px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
.th li.done{color:var(--muted);text-decoration:line-through}.th li.done:before{background:var(--green)}
.th.big li{font-size:16px;font-weight:600}
.dl{list-style:none}.dl li{padding:7px 0;font-size:14px;border-bottom:1px solid var(--line)}
.dd{display:inline-block;min-width:38px;font-weight:700;color:var(--accent)}.dd.soon{color:var(--red)}.dd.mid{color:var(--yellow)}
.dv{color:var(--muted);font-size:12px}
.day{margin-bottom:12px}.dn{color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.ev{padding:3px 0;font-size:13.5px}.ev .t{color:var(--muted);display:inline-block;width:74px}.ev.done{text-decoration:line-through;color:var(--muted);opacity:.6}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px;margin-bottom:12px}
.ch{font-size:16px;margin-bottom:5px}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px}
.dot.green{background:var(--green)}.dot.yellow{background:var(--yellow)}.dot.red{background:var(--red)}
.stage{color:var(--muted);font-size:13px;margin-bottom:8px}
.next{border-left:3px solid var(--accent);padding:3px 0 3px 10px;font-size:14px;margin-bottom:10px}
.metrics{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}.mc{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:4px 9px;font-size:12px;color:var(--muted)}.mc b{color:var(--ink)}
.sub{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:6px 0 2px}
details{margin-top:6px}summary{font-size:12px;color:var(--muted);cursor:pointer}
.njournal{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px;line-height:1.55;overflow-wrap:anywhere}
.njournal a{color:var(--accent)}
.nlc{font-size:13.5px;color:var(--muted);margin-bottom:6px}.nlc b{color:var(--ink)}.nlc b.soon{color:var(--red)}.nlc b.mid{color:var(--yellow)}
.msg{padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}.acct{font-size:9px;text-transform:uppercase;background:rgba(139,126,248,.18);color:var(--accent);padding:1px 6px;border-radius:99px;margin-right:6px}
.msg a{color:var(--ink);text-decoration:none}.from{color:var(--muted);font-size:11px}
.lnk,.mov{padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lnk a{color:var(--ink);text-decoration:none}.ln{color:var(--muted);font-size:12px}
#gate{max-width:340px;margin:22vh auto 0;text-align:center}#gate h1{margin-bottom:20px}
#pass{width:100%;background:var(--card);border:1px solid var(--line);border-radius:9px;color:var(--ink);padding:12px 14px;font-size:16px;margin-bottom:12px}
#go{width:100%;background:var(--accent);color:#17141f;border:0;border-radius:9px;padding:12px;font-size:15px;font-weight:700;cursor:pointer}
.rem{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:12px;color:var(--muted);font-size:13px}
#err{color:var(--red);font-size:13px;min-height:18px;margin-top:10px}</style></head>
<body>
<div id="gate"><h1>TPK<span class="os">OS</span></h1><input id="pass" type="password" placeholder="passphrase" autocomplete="current-password"><button id="go">Unlock</button><label class="rem"><input type="checkbox" id="remember" checked> remember on this device</label><div id="err"></div></div>
<div id="app" hidden></div>
