<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"><meta name="theme-color" content="#101114"><title>TPK OS</title><style>
:root{--bg:#101114;--panel:#17181d;--card:#1c1e24;--line:#2a2d36;--ink:#e8e8ec;--muted:#8b8f9c;--accent:#8b7ef8;--green:#3fbf6f;--yellow:#e0b13f;--red:#e05252}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:16px 14px 60px;max-width:640px;margin:0 auto}
h1{font-size:18px;letter-spacing:.2em}h1 .os{color:var(--accent)}
h2{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);margin:26px 0 10px}
.gen{color:var(--muted);font-size:11px;margin:4px 0 8px}
.empty{color:var(--muted);font-size:13px}
.th{list-style:none}.th li{padding:6px 0 6px 20px;position:relative;font-size:14px;border-bottom:1px solid var(--line)}
.th li:before{content:"";position:absolute;left:2px;top:12px;width:6px;height:6px;border-radius:50%;background:var(--accent)}
.th li.done{color:var(--muted);text-decoration:line-through}.th li.done:before{background:var(--green)}
.th.big li{font-size:16px;font-weight:600}
.dl{list-style:none}.dl li{padding:7px 0;font-size:14px;border-bottom:1px solid var(--line)}
.dd{display:inline-block;min-width:38px;font-weight:700;color:var(--accent)}.dd.soon{color:var(--red)}.dd.mid{color:var(--yellow)}
.dv{color:var(--muted);font-size:12px}
.day{margin-bottom:12px}.dn{color:var(--accent);font-size:12px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.ev{padding:3px 0;font-size:13.5px}.ev .t{color:var(--muted);display:inline-block;width:74px}.ev.done{text-decoration:line-through;color:var(--muted);opacity:.6}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px;margin-bottom:12px}
.ch{font-size:16px;margin-bottom:5px}.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px}
.dot.green{background:var(--green)}.dot.yellow{background:var(--yellow)}.dot.red{background:var(--red)}
.stage{color:var(--muted);font-size:13px;margin-bottom:8px}
.next{border-left:3px solid var(--accent);padding:3px 0 3px 10px;font-size:14px;margin-bottom:10px}
.metrics{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}.mc{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:4px 9px;font-size:12px;color:var(--muted)}.mc b{color:var(--ink)}
.sub{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:6px 0 2px}
details{margin-top:6px}summary{font-size:12px;color:var(--muted);cursor:pointer}
.njournal{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-top:8px;font-size:13px;line-height:1.55;overflow-wrap:anywhere}
.njournal a{color:var(--accent)}
.nlc{font-size:13.5px;color:var(--muted);margin-bottom:6px}.nlc b{color:var(--ink)}.nlc b.soon{color:var(--red)}.nlc b.mid{color:var(--yellow)}
.msg{padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}.acct{font-size:9px;text-transform:uppercase;background:rgba(139,126,248,.18);color:var(--accent);padding:1px 6px;border-radius:99px;margin-right:6px}
.msg a{color:var(--ink);text-decoration:none}.from{color:var(--muted);font-size:11px}
.lnk,.mov{padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lnk a{color:var(--ink);text-decoration:none}.ln{color:var(--muted);font-size:12px}
#gate{max-width:340px;margin:22vh auto 0;text-align:center}#gate h1{margin-bottom:20px}
#pass{width:100%;background:var(--card);border:1px solid var(--line);border-radius:9px;color:var(--ink);padding:12px 14px;font-size:16px;margin-bottom:12px}
#go{width:100%;background:var(--accent);color:#17141f;border:0;border-radius:9px;padding:12px;font-size:15px;font-weight:700;cursor:pointer}
.rem{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:12px;color:var(--muted);font-size:13px}
#err{color:var(--red);font-size:13px;min-height:18px;margin-top:10px}</style></head>
<body>
<div id="gate"><h1>TPK<span class="os">OS</span></h1><input id="pass" type="password" placeholder="passphrase" autocomplete="current-password"><button id="go">Unlock</button><label class="rem"><input type="checkbox" id="remember" checked> remember on this device</label><div id="err"></div></div>

  const esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const inl = (s) => esc(s).replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>').replace(/~~([^~]+)~~/g, '<s>$1</s>').replace(/`([^`]+)`/g, '<code>$1</code>');
  const b64d = (s) => Uint8Array.from(atob(s), (c) => c.charCodeAt(0));
  async function decrypt(passphrase) {
    const enc = new TextEncoder();
    const km = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt: b64d(P.salt), iterations: 150000, hash: 'SHA-256' }, km, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64d(P.iv) }, key, b64d(P.ct));
    return JSON.parse(new TextDecoder().decode(pt));
  }
  const daysUntil = (d) => Math.round((new Date(d + 'T00:00') - new Date(new Date().toDateString())) / 864e5);
  const t12 = (t) => { if (!t) return 'all-day'; const [h, m] = t.split(':').map(Number); const ap = h >= 12 ? 'PM' : 'AM'; return `${h % 12 || 12}:${String(m).padStart(2, '0')} ${ap}`; };
  const threadList = (md) => !md ? '' : '<ul class="th">' + md.split('\n').map((l) => { const m = l.match(/^\s*-\s*\[([ xX])\]\s*(.*)$/); return m ? `<li class="${/[xX]/.test(m[1]) ? 'done' : ''}">${inl(m[2])}</li>` : ''; }).filter(Boolean).join('') + '</ul>';
  // freeform notes: escape → autolink → bold → headers-as-bold → bullets → <br>
  const notesHTML = (t) => esc(t)
    .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>')
    .replace(/\*\*([^*]+)\*\*/g, '<b>$1</b>')
    .replace(/~~([^~]+)~~/g, '<s>$1</s>')
    .replace(/^#{1,6}\s*(.*)$/gm, '<b>$1</b>')
    .replace(/^(\s*)[-*]\s+(.*)$/gm, (_, ind, txt) => '&nbsp;&nbsp;&nbsp;'.repeat(Math.floor(ind.replace(/\t/g, '  ').length / 2)) + '• ' + txt) // keep sub-bullet indent
    .replace(/\n/g, '<br>');

  function render(d) {
    const parts = [];
    parts.push(`<div class="gen">snapshot · ${new Date(GEN).toLocaleString([], { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</div>`);

    // today
    const pr = (d.today.priorities || []);
    parts.push(`<h2>🎯 Today</h2>`);
    parts.push(pr.length ? '<ul class="th big">' + pr.map((p) => `<li class="${p.done ? 'done' : ''}">${inl(p.text)}</li>`).join('') + '</ul>' : '<div class="empty">Nothing set.</div>');

    // upcoming deadlines
    const dl = [];
    d.ventures.forEach((v) => (v.deadlines || []).forEach((x) => { const days = daysUntil(x.date); if (days >= 0) dl.push({ ...x, days, v: v.venture, emoji: v.emoji }); }));
    dl.sort((a, b) => a.days - b.days);
    if (dl.length) parts.push(`<h2>📡 Upcoming</h2><ul class="dl">` + dl.slice(0, 12).map((x) => `<li><span class="dd ${x.days <= 14 ? 'soon' : x.days <= 30 ? 'mid' : ''}">${x.days}d</span> ${esc(x.label)} <span class="dv">${x.emoji || ''} ${esc(x.v)}</span></li>`).join('') + '</ul>');

    // newsletter (bi-weekly countdown + idea inbox)
    if (d.newsletter && (d.newsletter.anchor || (d.newsletter.ideas || []).length)) {
      let cd = '';
      if (d.newsletter.anchor) {
        let nd = new Date(d.newsletter.anchor + 'T00:00');
        const t0 = new Date(new Date().toDateString());
        while (nd < t0) nd = new Date(+nd + 14 * 864e5);
        const days = Math.round((nd - t0) / 864e5);
        cd = `<div class="nlc">next issue <b class="${days <= 3 ? 'soon' : days <= 7 ? 'mid' : ''}">${nd.toLocaleDateString([], { month: 'short', day: 'numeric' })}</b> · ${days === 0 ? 'today' : 'in ' + days + 'd'}</div>`;
      }
      const ideas = (d.newsletter.ideas || []).filter((i) => !i.done);
      parts.push(`<h2>📰 Newsletter</h2>` + cd + (ideas.length ? '<ul class="th">' + ideas.map((i) => `<li>${inl(i.text)}</li>`).join('') + '</ul>' : ''));
    }

    // agenda
    if (d.agenda && d.agenda.length) {
      const byDay = {}; d.agenda.forEach((e) => (byDay[e.date] ??= []).push(e));
      const name = (dt) => { const n = daysUntil(dt); return n === 0 ? 'Today' : n === 1 ? 'Tomorrow' : new Date(dt + 'T00:00').toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' }); };
      parts.push(`<h2>📅 Next 5 days</h2>` + Object.entries(byDay).map(([dt, evs]) => `<div class="day"><div class="dn">${name(dt)}</div>` + evs.map((e) => `<div class="ev ${e.done ? 'done' : ''}"><span class="t">${t12(e.time)}</span>${esc(e.summary)}${e.recurring ? ' ↻' : ''}</div>`).join('') + '</div>').join(''));
    }

    // buckets
    parts.push(`<h2>📁 Buckets</h2>`);
    d.ventures.forEach((v) => {
      const metrics = (v.metrics || []).map((m) => `<span class="mc"><b>${esc(m.value)}</b> ${esc(m.label)}</span>`).join('');
      parts.push(`<div class="card">
        <div class="ch">${v.emoji ? esc(v.emoji) + ' ' : ''}<b>${esc(v.venture)}</b></div>
        <div class="stage">${esc(v.stage)}</div>
        ${v.next_action ? `<div class="next">${inl(v.next_action)}</div>` : ''}
        ${metrics ? `<div class="metrics">${metrics}</div>` : ''}
        ${v.open ? `<div class="sub">Priority notes</div>${threadList(v.open)}` : ''}
        ${v.longterm ? `<details><summary>Long-term notes</summary>${threadList(v.longterm)}</details>` : ''}
        ${v.notes ? `<details><summary>📓 Notes / journal</summary><div class="njournal">${notesHTML(v.notes)}</div></details>` : ''}
      </div>`);
    });

    // starred email
    if (d.inbox && d.inbox.length) parts.push(`<h2>📧 Starred</h2>` + d.inbox.slice(0, 10).map((m) => `<div class="msg"><span class="acct">${esc(m.account)}</span><a href="${esc(m.link)}" target="_blank" rel="noopener">${esc(m.subject)}</a><div class="from">${esc(m.from)}</div></div>`).join(''));

    // reading room
    if (d.links && d.links.length) parts.push(`<h2>📚 Reading room</h2>` + d.links.map((l) => `<div class="lnk"><a href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.url.replace(/^https?:\/\/(www\.)?/, ''))}</a>${l.note ? ` <span class="ln">${esc(l.note)}</span>` : ''}</div>`).join(''));

    // movies
    if (d.movies && d.movies.length) parts.push(`<h2>🍿 Watchlist</h2>` + d.movies.map((m) => `<div class="mov"><b>${esc(m.title)}</b>${m.why ? ` <span class="ln">${esc(m.why)}</span>` : ''}</div>`).join(''));

    $('#app').innerHTML = parts.join('');
    $('#app').hidden = false;
    $('#gate').hidden = true;
  }

  async function unlock(pass, remember) {
    try {
      const data = await decrypt(pass);
      if (remember) localStorage.setItem('tpkos_pass', pass);
      render(data);
    } catch (e) {
      $('#err').textContent = 'Wrong passphrase.';
      localStorage.removeItem('tpkos_pass');
    }
  }
  $('#go').onclick = () => unlock($('#pass').value, $('#remember').checked);
  $('#pass').onkeydown = (e) => { if (e.key === 'Enter') $('#go').click(); };
  const saved = localStorage.getItem('tpkos_pass');
  if (saved) unlock(saved, true);
})();</script>
</body></html>
